name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run package
      - name: Verify bundled action is up to date
        run: git diff --exit-code -- dist/index.js
      - name: Generate PR diff
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git diff --unified=0 \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            > /tmp/pr.diff
      - name: Check PR diff with local action
        if: github.event_name == 'pull_request'
        uses: ./
        with:
          diff-file: /tmp/pr.diff
